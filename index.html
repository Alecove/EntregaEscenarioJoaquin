<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector de Asientos VIP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor-teatro">
        <svg viewBox="0 0 800 600" id="teatro" xmlns="http://www.w3.org/2000/svg">
            
            <defs>
                <radialGradient id="brilloPantalla" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#3498db" stop-opacity="0.5"/>
                    <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
                </radialGradient>
            </defs>

            <rect x="0" y="0" width="800" height="200" fill="#0f0f1a" />
            <rect x="250" y="20" width="300" height="80" fill="url(#brilloPantalla)" />
            <rect x="300" y="30" width="200" height="60" fill="#ecf0f1" rx="5" /> <path d="M 0 0 L 200 0 Q 150 100 0 250 Z" fill="#8b0000" />
            <path d="M 800 0 L 600 0 Q 650 100 800 250 Z" fill="#8b0000" />

            <path d="M 150 150 Q 400 200 650 150 L 600 120 Q 400 150 200 120 Z" fill="#34495e" stroke="#2c3e50" stroke-width="4"/>
            <text x="400" y="145" font-family="sans-serif" font-weight="bold" font-size="16" fill="#bdc3c7" text-anchor="middle" letter-spacing="5">ESCENARIO</text>

            <g id="zona-butacas"></g>
            
        </svg>
    </div>

    <script src="script.js"></script>
</body>
</html>
